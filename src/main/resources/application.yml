spring:
  application:
    name: saas-app
  config:
    import: optional:file:.env[.propertie]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:saas-app-db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 30000
      max-lifetime: 1200000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
        multi_tenancy: SCHEMA
    show-sql: true
    open-in-view: false

  app:
    jwt:
      private-key-path: ${JWT_PRIVATE_KEY_PATH:certs/private_key.pem}
      public-key-path: ${JWT_PUBLIC_KEY_PATH:certs/public_key.pem}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}

  springdoc:
    default-produces-media-type: application/json
    swagger-ui:
      enabled: true
      operations-sorter: true
      tags-sorter: alpha

server:
  servlet:
    context-path: /api/v1
